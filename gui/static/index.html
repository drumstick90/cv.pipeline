<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV Pipeline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #334155;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      border: 1px solid #e2e8f0;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #0f172a;
    }
    .subtitle {
      color: #64748b;
      margin: 0 0 16px 0;
      font-size: 14px;
    }
    .status {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 24px;
    }
    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }
    .section {
      margin-bottom: 20px;
    }
    .label {
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
      color: #334155;
    }
    input, textarea {
      font-family: inherit;
      font-size: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .progress-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
    }
    .progress-steps span {
      padding: 2px 8px;
      border-radius: 4px;
      background: #f1f5f9;
    }
    .progress-steps span.done {
      background: #dcfce7;
      color: #16a34a;
    }
    .progress-steps span.active {
      background: #dbeafe;
      color: #2563eb;
      font-weight: 500;
    }
    .cli-log {
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      font-size: 12px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-top: 12px;
      min-height: 2.6em;
      line-height: 1.4;
    }
    .cli-log .line { white-space: pre; }
    .cli-log .line:empty::before { content: '\00a0'; }
    .cli-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: #3b82f6;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    input[type="submit"] {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: 600;
      border-radius: 8px;
      width: auto;
      transition: background 0.15s, transform 0.1s;
    }
    input[type="submit"]:hover:not(:disabled) {
      background: #2563eb;
    }
    input[type="submit"]:active:not(:disabled) {
      transform: scale(0.98);
    }
    input[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status-msg { color: #64748b; font-size: 14px; }
    .status-msg.error { color: #dc2626; font-weight: 500; }
    .status-msg.success { color: #16a34a; font-weight: 500; }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
    }
    pre {
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      font-size: 13px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 400px;
      overflow-y: auto;
      margin: 0;
    }
    .output-section {
      margin-bottom: 20px;
    }
    .output-section:last-child { margin-bottom: 0; }
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .output-header .label { margin-bottom: 0; }
    .btn-copy {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover {
      background: #e2e8f0;
      color: #334155;
    }
    .btn-copy.copied {
      background: #dcfce7;
      color: #16a34a;
      border-color: #bbf7d0;
    }
    .pdf-upload-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .btn-pdf {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .btn-pdf:hover {
      background: #e2e8f0;
      color: #334155;
    }
    .pdf-status {
      font-size: 13px;
      color: #64748b;
    }
    .pdf-status.error { color: #dc2626; }
    .pdf-status.success { color: #16a34a; }
    #output { margin-top: 8px; }
    .cost-display {
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 16px;
    }
    a { color: #3b82f6; }
    .payload-inspector {
      margin-top: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .payload-inspector-header {
      padding: 10px 14px;
      background: #f8fafc;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .payload-inspector-header:hover { background: #f1f5f9; }
    .payload-inspector-body { padding: 12px; }
    .payload-step {
      margin-bottom: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
    }
    .payload-step:last-child { margin-bottom: 0; }
    .payload-step-header {
      padding: 8px 12px;
      background: #f1f5f9;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .payload-step-header:hover { background: #e2e8f0; }
    .payload-step-body { padding: 12px; }
    .payload-block {
      margin-bottom: 12px;
      font-size: 12px;
    }
    .payload-block:last-child { margin-bottom: 0; }
    .payload-block-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: #475569;
    }
    .payload-json, .payload-text {
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      font-size: 12px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 4px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 120px;
      max-height: 400px;
      overflow-y: auto;
    }
    .payload-text { min-height: 160px; max-height: 500px; }
    .payload-block-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .btn-copy-sm {
      padding: 4px 8px;
      font-size: 11px;
      background: #334155;
      color: #e2e8f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-copy-sm:hover { background: #475569; }
    .advanced-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn-advanced {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-advanced:hover {
      background: #e2e8f0;
      color: #334155;
    }
    .btn-advanced.btn-disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-advanced.btn-disabled:hover {
      background: #f1f5f9;
      color: #475569;
    }
    .advanced-hint {
      font-size: 12px;
      color: #94a3b8;
    }
    .prompts-panel {
      margin-top: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      background: #fafafa;
    }
    .prompts-panel-header {
      padding: 10px 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      background: #f1f5f9;
    }
    .prompts-panel-header:hover { background: #e2e8f0; }
    .prompts-panel-body { padding: 16px; }
    .prompts-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .prompts-tab {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      background: #e2e8f0;
      color: #475569;
      border: none;
    }
    .prompts-tab:hover { background: #cbd5e1; }
    .prompts-tab.active { background: #3b82f6; color: #fff; }
    .prompts-editor .label { font-size: 13px; margin-bottom: 4px; }
    .prompts-editor textarea {
      min-height: 200px;
      font-size: 13px;
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
    }
    .prompts-editor .field { margin-bottom: 12px; }
    .prompts-editor .field:last-child { margin-bottom: 0; }
    .btn-reset {
      margin-top: 12px;
      padding: 6px 12px;
      font-size: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-reset:hover { background: #fee2e2; }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 400px;
      max-width: 90vw;
      height: 100vh;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.08);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow: hidden;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-header h2 { margin: 0; font-size: 16px; font-weight: 600; }
    .sidebar-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #64748b;
      padding: 4px;
      line-height: 1;
    }
    .sidebar-close:hover { color: #334155; }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .sidebar-tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: #f8fafc;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #64748b;
    }
    .sidebar-tab:hover { color: #334155; background: #f1f5f9; }
    .sidebar-tab.active { background: #fff; color: #3b82f6; border-bottom: 2px solid #3b82f6; margin-bottom: -1px; }
    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .sidebar-pane { display: none; }
    .sidebar-pane.active { display: block; }
    .btn-open-sidebar {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 64px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-left: none;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      font-size: 14px;
      color: #64748b;
      z-index: 999;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-open-sidebar:hover { background: #f8fafc; color: #3b82f6; }
    .btn-open-sidebar.hidden { display: none; }
    .main-content {
      transition: margin-left 0.25s ease;
      min-height: 100vh;
    }
    .sidebar.open ~ .main-content {
      margin-left: 400px;
    }
  </style>
</head>
<body>
  <button type="button" class="btn-open-sidebar hidden" id="btn_open_sidebar" title="Apri pannello">☰</button>
  <div class="sidebar open" id="sidebar">
    <div class="sidebar-header">
      <h2>Pannello</h2>
      <button type="button" class="sidebar-close" id="sidebar_close">×</button>
    </div>
    <div class="sidebar-tabs">
      <button type="button" class="sidebar-tab active" data-pane="prompts">Prompts</button>
      <button type="button" class="sidebar-tab" data-pane="payloads">Payloads</button>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-pane active" id="pane_prompts">
        <div class="prompts-tabs" id="prompts_tabs"></div>
        <div class="prompts-editor" id="prompts_editor"></div>
        <button type="button" class="btn-reset" id="btn_reset_prompts">Reset to defaults</button>
      </div>
      <div class="sidebar-pane" id="pane_payloads">
        <div id="payload_body"></div>
      </div>
    </div>
  </div>
  <div class="main-content">
  <div class="card">
    <h1>CV Pipeline</h1>
    <p class="subtitle">7-step resume improvement via Claude. Paste your resume below.</p>
    <p class="status">Typical cost: ~$0.15–0.45 per run (Sonnet). Actual cost shown after completion. Model: <span id="model_info">—</span></p>
    <hr>
    <div id="alert" class="alert" style="display:none;"></div>
    <form id="form">
      <div class="section" id="apikey_section" style="display:none;">
        <label class="label" for="api_key">API Key (required when .env is empty)</label>
        <input type="password" name="api_key" id="api_key" placeholder="sk-ant-...">
      </div>
      <div class="section">
        <label class="label" for="resume">Resume (paste text from PDF or .txt)</label>
        <div class="pdf-upload-row">
          <input type="file" id="pdf_input" accept=".pdf" style="display:none">
          <button type="button" class="btn-pdf" id="pdf_btn">Upload PDF (extract text)</button>
          <span id="pdf_status" class="pdf-status"></span>
        </div>
        <textarea name="resume" id="resume" required></textarea>
      </div>
      <div class="section">
        <label class="label" for="target_role">Target Role</label>
        <input type="text" name="target_role" id="target_role" placeholder="e.g. Senior Software Engineer" required>
      </div>
      <div class="section">
        <label class="label" for="job_description">Job Description (optional, for ATS alignment)</label>
        <textarea name="job_description" id="job_description"></textarea>
      </div>
      <div class="section">
        <button type="button" class="btn-advanced" id="btn_edit_prompts">Edit prompts</button>
      </div>
      <div class="section">
        <div class="btn-row">
          <input type="submit" id="submit_btn" value="Run Pipeline">
          <span id="status" class="status-msg"></span>
        </div>
        <div id="progress_steps" class="progress-steps" style="display:none;"></div>
        <div id="cli_log" class="cli-log" style="display:none;">
          <div class="line" id="cli_line1"></div>
          <div class="line" id="cli_line2"></div>
        </div>
      </div>
    </form>
    <hr>
    <div id="advanced_row" class="advanced-row" style="display:none;">
      <button type="button" class="btn-advanced" id="btn_payloads">View payloads</button>
      <span class="advanced-hint">(request/response per step)</span>
    </div>
    <div id="output" style="display:none;">
      <div class="output-header" style="margin-bottom:16px;">
        <span id="cost_display" class="cost-display"></span>
        <button type="button" class="btn-copy" id="copy_btn">Copy to clipboard</button>
      </div>
      <div class="output-section">
        <div class="label">Audit</div>
        <pre id="audit"></pre>
      </div>
      <div class="output-section">
        <div class="label">Final Resume</div>
        <pre id="final_resume"></pre>
      </div>
    </div>
  </div>
  </div>
  <script>
    const form = document.getElementById('form');
    const status = document.getElementById('status');
    const submitBtn = document.getElementById('submit_btn');
    const output = document.getElementById('output');
    const auditEl = document.getElementById('audit');
    const finalEl = document.getElementById('final_resume');
    const costEl = document.getElementById('cost_display');
    const apikeySection = document.getElementById('apikey_section');
    const apikeyInput = document.getElementById('api_key');
    const alertEl = document.getElementById('alert');
    const copyBtn = document.getElementById('copy_btn');
    const progressStepsEl = document.getElementById('progress_steps');
    const cliLogEl = document.getElementById('cli_log');
    const cliLine1 = document.getElementById('cli_line1');
    const cliLine2 = document.getElementById('cli_line2');

    const STEP_NAMES = [
      'Audit', 'Positioning', 'Achievements', 'ATS', 'Tone', 'Scan', 'Polish'
    ];

    function renderPayloadInspector(stepPayloads) {
      const container = document.getElementById('payload_body');
      const advancedRow = document.getElementById('advanced_row');
      if (!stepPayloads || Object.keys(stepPayloads).length === 0) {
        if (advancedRow) advancedRow.style.display = 'none';
        return;
      }
      if (advancedRow) advancedRow.style.display = 'flex';
      const steps = Object.keys(stepPayloads).map(Number).sort((a, b) => a - b);
      container.innerHTML = steps.map(stepNum => {
        const p = stepPayloads[stepNum];
        const name = STEP_NAMES[stepNum - 1] || `Step ${stepNum}`;
        const req = p.request || {};
        const res = p.response || {};
        const reqJson = JSON.stringify({
          model: req.model,
          max_tokens: req.max_tokens,
          system: req.system || null,
          messages: req.messages
        }, null, 2);
        const resText = res.raw_text || '';
        const resMeta = res.usage ? `Tokens: in=${res.usage.input_tokens} out=${res.usage.output_tokens}` : '';
        const id = 'payload-step-' + stepNum;
        return `
          <div class="payload-step">
            <div class="payload-step-header" onclick="var b=this.nextElementSibling; b.style.display=b.style.display==='none'?'block':'none'">
              Step ${stepNum}: ${name}
            </div>
            <div class="payload-step-body" style="display:none">
              <div class="payload-block">
                <div class="payload-block-row">
                  <span class="payload-block-title">Request</span>
                  <button type="button" class="btn-copy-sm" data-copy="${id}-req">Copy</button>
                </div>
                <pre class="payload-json" id="${id}-req">${escapeHtml(reqJson)}</pre>
              </div>
              <div class="payload-block">
                <div class="payload-block-row">
                  <span class="payload-block-title">Response ${resMeta ? '(' + resMeta + ')' : ''}</span>
                  <button type="button" class="btn-copy-sm" data-copy="${id}-res">Copy</button>
                </div>
                <pre class="payload-text" id="${id}-res">${escapeHtml(resText)}</pre>
              </div>
            </div>
          </div>
        `;
      }).join('');
      container.querySelectorAll('[data-copy]').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-copy');
          const el = document.getElementById(id);
          if (el) {
            navigator.clipboard.writeText(el.textContent);
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
          }
        };
      });
    }

    function openSidebar(pane) {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.add('open');
      document.getElementById('btn_open_sidebar').classList.add('hidden');
      if (pane) {
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        const tab = document.querySelector('.sidebar-tab[data-pane="' + pane + '"]');
        if (tab) tab.classList.add('active');
        document.querySelectorAll('.sidebar-pane').forEach(p => p.classList.remove('active'));
        const paneEl = document.getElementById('pane_' + pane);
        if (paneEl) paneEl.classList.add('active');
      }
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('btn_open_sidebar').classList.remove('hidden');
    }

    document.getElementById('btn_open_sidebar').addEventListener('click', () => openSidebar());
    document.getElementById('sidebar_close').addEventListener('click', closeSidebar);
    document.querySelectorAll('.sidebar-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const pane = t.dataset.pane;
        document.querySelectorAll('.sidebar-pane').forEach(p => p.classList.remove('active'));
        document.getElementById('pane_' + pane).classList.add('active');
      });
    });

    document.getElementById('btn_payloads').addEventListener('click', () => openSidebar('payloads'));
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function renderCliLog(lines, blinking) {
      const arr = Array.isArray(lines) ? lines : [];
      cliLogEl.style.display = 'block';
      cliLine1.textContent = arr[0] || (blinking ? 'Starting pipeline...' : '');
      cliLine2.innerHTML = '';
      if (arr[1]) cliLine2.appendChild(document.createTextNode(arr[1]));
      if (blinking) {
        const cursor = document.createElement('span');
        cursor.className = 'cli-cursor';
        cliLine2.appendChild(cursor);
      }
    }

    function renderProgress(completed, current) {
      progressStepsEl.style.display = 'flex';
      progressStepsEl.innerHTML = STEP_NAMES.map((name, i) => {
        const n = i + 1;
        let cls = '';
        if (completed.includes(n)) cls = 'done';
        else if (n === current) cls = 'active';
        return `<span class="${cls}">${n}. ${name}</span>`;
      }).join('');
    }

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = 'alert alert-' + type;
      alertEl.style.display = 'block';
    }
    function hideAlert() {
      alertEl.style.display = 'none';
    }
    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status-msg' + (type ? ' ' + type : '');
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      if (loading) {
        submitBtn.value = '';
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        submitBtn.appendChild(spinner);
      } else {
        submitBtn.innerHTML = '';
        submitBtn.value = 'Run Pipeline';
      }
    }

    copyBtn.addEventListener('click', () => {
      const text = finalEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    const pdfInput = document.getElementById('pdf_input');
    const pdfBtn = document.getElementById('pdf_btn');
    const pdfStatus = document.getElementById('pdf_status');
    const resumeEl = document.getElementById('resume');

    pdfBtn.addEventListener('click', () => pdfInput.click());
    pdfInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      pdfStatus.textContent = 'Extracting...';
      pdfStatus.className = 'pdf-status';
      pdfInput.value = '';
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch('/api/extract-pdf', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) {
          pdfStatus.textContent = data.error || 'Extraction failed';
          pdfStatus.className = 'pdf-status error';
          return;
        }
        resumeEl.value = data.text || '';
        pdfStatus.textContent = 'Text extracted (CMD+A style, no AI)';
        pdfStatus.className = 'pdf-status success';
        setTimeout(() => { pdfStatus.textContent = ''; }, 3000);
      } catch (err) {
        pdfStatus.textContent = 'Network error';
        pdfStatus.className = 'pdf-status error';
      }
    });

    let promptsState = null;

    async function loadPrompts() {
      const res = await fetch('/api/prompts');
      promptsState = await res.json();
      return promptsState;
    }

    function renderPromptsEditor() {
      const tabsEl = document.getElementById('prompts_tabs');
      const editorEl = document.getElementById('prompts_editor');
      if (!promptsState) return;
      const tabs = [
        { id: 'guardrails', label: 'Guardrails' },
        ...STEP_NAMES.map((name, i) => ({ id: 'step_' + (i + 1), label: (i + 1) + '. ' + name }))
      ];
      let activeTab = tabs[0].id;
      tabsEl.innerHTML = tabs.map(t => `<button type="button" class="prompts-tab ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`).join('');
      function showTab(id) {
        activeTab = id;
        tabsEl.querySelectorAll('.prompts-tab').forEach(b => {
          b.classList.toggle('active', b.dataset.tab === id);
        });
        if (id === 'guardrails') {
          const g = promptsState.guardrails || {};
          editorEl.innerHTML = `
            <div class="field">
              <div class="label">No hallucination</div>
              <textarea id="prompt_no_hallucination" data-key="guardrails.no_hallucination">${escapeHtml(g.no_hallucination || '')}</textarea>
            </div>
            <div class="field">
              <div class="label">No sycophancy</div>
              <textarea id="prompt_no_sycophancy" data-key="guardrails.no_sycophancy">${escapeHtml(g.no_sycophancy || '')}</textarea>
            </div>
          `;
        } else {
          const stepNum = id.replace('step_', '');
          const step = promptsState['step_' + stepNum] || {};
          editorEl.innerHTML = `
            <div class="field">
              <div class="label">User prompt</div>
              <textarea id="prompt_user" data-key="step_${stepNum}.user">${escapeHtml(step.user || '')}</textarea>
            </div>
            <div class="field">
              <div class="label">System prompt</div>
              <textarea id="prompt_system" data-key="step_${stepNum}.system">${escapeHtml(step.system || '')}</textarea>
            </div>
          `;
        }
        editorEl.querySelectorAll('textarea').forEach(ta => {
          ta.addEventListener('input', () => {
            const key = ta.dataset.key;
            const [a, b] = key.split('.');
            if (!promptsState[a]) promptsState[a] = {};
            promptsState[a][b] = ta.value;
          });
        });
      }
      showTab(activeTab);
      tabsEl.querySelectorAll('.prompts-tab').forEach(b => {
        b.addEventListener('click', () => showTab(b.dataset.tab));
      });
    }

    document.getElementById('btn_edit_prompts').addEventListener('click', async () => {
      if (!promptsState) await loadPrompts();
      renderPromptsEditor();
      openSidebar('prompts');
    });

    document.getElementById('btn_reset_prompts').addEventListener('click', async () => {
      await loadPrompts();
      renderPromptsEditor();
    });

    fetch('/api/check-key').then(r => r.json()).then(data => {
      if (!data.has_key) apikeySection.style.display = 'block';
    });
    fetch('/api/model').then(r => r.json()).then(data => {
      const el = document.getElementById('model_info');
      if (el && data.model) el.textContent = data.model;
    }).catch(() => {});
    loadPrompts().then(renderPromptsEditor).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      setStatus('Starting...');
      setLoading(true);
      output.style.display = 'none';
      document.getElementById('advanced_row').style.display = 'none';
      progressStepsEl.style.display = 'none';
      cliLogEl.style.display = 'none';

      const body = {
        resume: document.getElementById('resume').value,
        target_role: document.getElementById('target_role').value,
        job_description: document.getElementById('job_description').value || null
      };
      if (apikeySection.style.display !== 'none' && apikeyInput.value) {
        body.api_key = apikeyInput.value;
      }
      if (promptsState) {
        body.prompts = promptsState;
      }
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setLoading(false);
        setStatus('Error: ' + (err.error || res.statusText), 'error');
        showAlert(err.error || res.statusText, 'error');
        return;
      }

      const { job_id } = await res.json();
      setStatus('Step 1/7: Brutal Recruiter Audit...');

      const poll = setInterval(async () => {
        const s = await fetch('/api/status/' + job_id);
        const data = await s.json();

        if (data.status === 'running') {
          const step = data.current_step || 0;
          const name = data.step_name || '';
          const completed = data.completed_steps || [];
          const logLines = data.log_lines || [];
          setStatus(step ? `Step ${step}/7: ${name}...` : 'Starting...');
          renderProgress(completed, step);
          renderCliLog(logLines, true);
          if (data.step_payloads) renderPayloadInspector(data.step_payloads);
          return;
        }

        clearInterval(poll);
        setLoading(false);
        progressStepsEl.style.display = 'none';

        if (data.status === 'error') {
          setStatus('Error: ' + data.error, 'error');
          showAlert(data.error, 'error');
          cliLogEl.style.display = 'none';
          return;
        }

        setStatus('Done ✓', 'success');
        showAlert('Resume improved successfully.', 'success');
        renderCliLog(data.log_lines || [], false);
        costEl.textContent = (data.cost_usd != null && data.cost_usd > 0) ? `Cost this run: $${data.cost_usd.toFixed(4)}` : '';
        auditEl.textContent = data.audit || '';
        finalEl.textContent = data.final_resume || '';
        output.style.display = 'block';
        if (data.step_payloads) renderPayloadInspector(data.step_payloads);
      }, 1500);
    });
  </script>
</body>
</html>
