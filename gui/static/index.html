<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV Pipeline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #334155;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      border: 1px solid #e2e8f0;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #0f172a;
    }
    .subtitle {
      color: #64748b;
      margin: 0 0 16px 0;
      font-size: 14px;
    }
    .status {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 24px;
    }
    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }
    .section {
      margin-bottom: 20px;
    }
    .label {
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
      color: #334155;
    }
    input, textarea {
      font-family: inherit;
      font-size: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    input[type="submit"] {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: 600;
      border-radius: 8px;
      width: auto;
      transition: background 0.15s, transform 0.1s;
    }
    input[type="submit"]:hover:not(:disabled) {
      background: #2563eb;
    }
    input[type="submit"]:active:not(:disabled) {
      transform: scale(0.98);
    }
    input[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status-msg { color: #64748b; font-size: 14px; }
    .status-msg.error { color: #dc2626; font-weight: 500; }
    .status-msg.success { color: #16a34a; font-weight: 500; }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
    }
    pre {
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      font-size: 13px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 400px;
      overflow-y: auto;
      margin: 0;
    }
    .output-section {
      margin-bottom: 20px;
    }
    .output-section:last-child { margin-bottom: 0; }
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .output-header .label { margin-bottom: 0; }
    .btn-copy {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover {
      background: #e2e8f0;
      color: #334155;
    }
    .btn-copy.copied {
      background: #dcfce7;
      color: #16a34a;
      border-color: #bbf7d0;
    }
    #output { margin-top: 8px; }
    .cost-display {
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 16px;
    }
    a { color: #3b82f6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CV Pipeline</h1>
    <p class="subtitle">7-step resume improvement via Claude. Paste your resume below.</p>
    <p class="status">Typical cost: ~$0.15–0.45 per run (Sonnet). Actual cost shown after completion. Model: <span id="model_info">—</span></p>
    <hr>
    <div id="alert" class="alert" style="display:none;"></div>
    <form id="form">
      <div class="section" id="apikey_section" style="display:none;">
        <label class="label" for="api_key">API Key (required when .env is empty)</label>
        <input type="password" name="api_key" id="api_key" placeholder="sk-ant-...">
      </div>
      <div class="section">
        <label class="label" for="resume">Resume (paste text from PDF or .txt)</label>
        <textarea name="resume" id="resume" required></textarea>
      </div>
      <div class="section">
        <label class="label" for="target_role">Target Role</label>
        <input type="text" name="target_role" id="target_role" placeholder="e.g. Senior Software Engineer" required>
      </div>
      <div class="section">
        <label class="label" for="job_description">Job Description (optional, for ATS alignment)</label>
        <textarea name="job_description" id="job_description"></textarea>
      </div>
      <div class="section">
        <div class="btn-row">
          <input type="submit" id="submit_btn" value="Run Pipeline">
          <span id="status" class="status-msg"></span>
        </div>
      </div>
    </form>
    <hr>
    <div id="output" style="display:none;">
      <div class="output-header" style="margin-bottom:16px;">
        <span id="cost_display" class="cost-display"></span>
        <button type="button" class="btn-copy" id="copy_btn">Copy to clipboard</button>
      </div>
      <div class="output-section">
        <div class="label">Audit</div>
        <pre id="audit"></pre>
      </div>
      <div class="output-section">
        <div class="label">Final Resume</div>
        <pre id="final_resume"></pre>
      </div>
    </div>
  </div>
  <script>
    const form = document.getElementById('form');
    const status = document.getElementById('status');
    const submitBtn = document.getElementById('submit_btn');
    const output = document.getElementById('output');
    const auditEl = document.getElementById('audit');
    const finalEl = document.getElementById('final_resume');
    const costEl = document.getElementById('cost_display');
    const apikeySection = document.getElementById('apikey_section');
    const apikeyInput = document.getElementById('api_key');
    const alertEl = document.getElementById('alert');
    const copyBtn = document.getElementById('copy_btn');

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = 'alert alert-' + type;
      alertEl.style.display = 'block';
    }
    function hideAlert() {
      alertEl.style.display = 'none';
    }
    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status-msg' + (type ? ' ' + type : '');
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      if (loading) {
        submitBtn.value = '';
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        submitBtn.appendChild(spinner);
      } else {
        submitBtn.innerHTML = '';
        submitBtn.value = 'Run Pipeline';
      }
    }

    copyBtn.addEventListener('click', () => {
      const text = finalEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    fetch('/api/check-key').then(r => r.json()).then(data => {
      if (!data.has_key) apikeySection.style.display = 'block';
    });
    fetch('/api/model').then(r => r.json()).then(data => {
      const el = document.getElementById('model_info');
      if (el && data.model) el.textContent = data.model;
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      setStatus('Starting...');
      setLoading(true);
      output.style.display = 'none';

      const body = {
        resume: document.getElementById('resume').value,
        target_role: document.getElementById('target_role').value,
        job_description: document.getElementById('job_description').value || null
      };
      if (apikeySection.style.display !== 'none' && apikeyInput.value) {
        body.api_key = apikeyInput.value;
      }

      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setLoading(false);
        setStatus('Error: ' + (err.error || res.statusText), 'error');
        showAlert(err.error || res.statusText, 'error');
        return;
      }

      const { job_id } = await res.json();
      setStatus('Processing...');

      const poll = setInterval(async () => {
        const s = await fetch('/api/status/' + job_id);
        const data = await s.json();

        if (data.status === 'running') {
          return;
        }

        clearInterval(poll);
        setLoading(false);

        if (data.status === 'error') {
          setStatus('Error: ' + data.error, 'error');
          showAlert(data.error, 'error');
          return;
        }

        setStatus('Done ✓', 'success');
        showAlert('Resume improved successfully.', 'success');
        costEl.textContent = (data.cost_usd != null && data.cost_usd > 0) ? `Cost this run: $${data.cost_usd.toFixed(4)}` : '';
        auditEl.textContent = data.audit || '';
        finalEl.textContent = data.final_resume || '';
        output.style.display = 'block';
      }, 3000);
    });
  </script>
</body>
</html>
